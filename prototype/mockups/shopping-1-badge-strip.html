<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shopping 1 · Badge Strip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* KONZEPT 1 — Badge Strip:
     closest to today's fridge look — .shelf/.shelf-head section headers,
     rounded item-cards with a left accent bar, source/signal as a colored
     pill badge inline in the meta row, instant "✓ gekauft" as a solid pill.
     Tapping a suggestion's "+" locally moves the card into "Auf der Liste". */
  .concept-tag {
    display:inline-flex; align-items:center; gap:7px; font-family:"IBM Plex Mono",monospace;
    font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint);
    background:var(--surface); border:1px solid var(--line-soft); border-radius:999px;
    padding:6px 12px; margin-bottom:14px; box-shadow:var(--shadow);
  }
  .concept-tag b { color:var(--accent); }
  .app { padding-top:20px; }
  h1.pagetitle {
    font-family:"Fraunces",serif; font-weight:600; font-size:26px; letter-spacing:-.01em;
    color:var(--ink); margin-bottom:2px;
  }
  .devtoggle {
    font-family:"IBM Plex Mono",monospace; font-size:10.5px; color:var(--ink-faint);
    cursor:pointer; text-decoration:underline; margin-left:auto; background:none; border:none;
  }

  .shelf-head { margin-top:22px; }

  .srow {
    position:relative; display:grid; grid-template-columns:auto 1fr auto;
    align-items:center; column-gap:13px; padding:12px 14px; margin-bottom:9px;
    background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden; transition:opacity .2s var(--ease);
  }
  .srow::before { content:""; position:absolute; left:0; top:13px; bottom:13px; width:3px; border-radius:0 3px 3px 0; background:var(--c,transparent); }
  .srow.bought { opacity:.5; }
  .srow.moved { opacity:0; transform:translateX(16px); }

  .sdone {
    width:30px; height:30px; border-radius:50%; flex:0 0 auto; cursor:pointer;
    border:2px solid var(--line); background:var(--surface-2); display:grid; place-items:center;
    font-size:14px; color:transparent; transition:all .15s var(--ease);
  }
  .sdone.checked { background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .sdone.checked::after { content:"✓"; }

  .sbody { min-width:0; }
  .sname { font-family:"Fraunces",serif; font-weight:600; font-size:16px; color:var(--ink); }
  .srow.bought .sname { text-decoration:line-through; color:var(--ink-dim); }
  .smeta { display:flex; align-items:center; gap:8px; margin-top:4px; }
  .samt { font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--ink-faint); }
  .sbadge {
    font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:10px; letter-spacing:.03em;
    padding:3px 9px; border-radius:999px; color:var(--c); background:var(--cbg);
    border:1px solid color-mix(in srgb, var(--c) 28%, transparent);
  }
  .sreason { font-family:"Hanken Grotesk",sans-serif; font-size:12.5px; color:var(--ink-dim); margin-top:4px; line-height:1.35; }

  .sbuy, .sadd {
    flex:0 0 auto; cursor:pointer; border:none; font-family:"Hanken Grotesk",sans-serif; font-weight:700;
    box-shadow:var(--shadow); transition:filter .15s, transform .12s var(--ease);
  }
  .sbuy:active, .sadd:active { transform:scale(.94); }
  .sbuy {
    font-size:12.5px; color:var(--accent-ink); background:var(--accent); border-radius:999px; padding:9px 14px; white-space:nowrap;
  }
  .sbuy:disabled { background:var(--staple); opacity:.7; cursor:default; }
  .sadd {
    width:36px; height:36px; border-radius:50%; font-size:19px; color:var(--accent-ink); background:var(--accent);
    display:grid; place-items:center; line-height:1;
  }

  .iadd {
    display:flex; align-items:center; gap:10px; width:100%; cursor:pointer; text-align:left;
    background:var(--surface); border:1px dashed var(--line); border-radius:14px;
    padding:13px 14px; margin-top:10px; font-family:"Hanken Grotesk",sans-serif; font-weight:700;
    font-size:14px; color:var(--ink-dim); transition:border-color .15s;
  }
  .iadd:hover { border-color:var(--accent); color:var(--accent); }
  .iadd .he { font-size:17px; }
  .addpanel { display:none; margin-top:10px; background:var(--surface-2); border:1px solid var(--line-soft); border-radius:14px; padding:13px 14px; }
  .addpanel.show { display:block; }
  .addpanel input[type=text] {
    width:100%; font-family:"Hanken Grotesk",sans-serif; font-size:14px; color:var(--ink);
    background:var(--surface); border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px;
  }
  .addpanel .chiprow { display:flex; gap:7px; margin-top:9px; flex-wrap:wrap; }
  .addpanel .row { display:flex; gap:8px; margin-top:11px; }
  .btn { flex:1; border:none; border-radius:12px; padding:10px; font-family:"Hanken Grotesk",sans-serif; font-weight:700; font-size:13.5px; cursor:pointer; }
  .btn.solid { background:var(--accent); color:var(--accent-ink); }
  .btn.ghost { background:var(--surface); border:1px solid var(--line); color:var(--ink-dim); }

  /* .chip isn't in _base.css yet (ported from fridge-now.html:329-341) */
  .chip {
    flex:0 0 auto; cursor:pointer; user-select:none; border:1px solid var(--line-soft);
    font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--ink-dim); background:var(--surface);
    border-radius:999px; padding:7px 13px; transition:all .2s var(--ease); white-space:nowrap; box-shadow:var(--shadow);
  }
  .chip.active { color:var(--accent-ink); background:var(--accent); border-color:var(--accent); font-weight:600; }
</style>
</head><body>
  <div class="app">
    <div class="concept-tag">Konzept 1 — <b>Badge Strip</b></div>
    <h1 class="pagetitle">🛒 Einkaufsliste</h1>

    <section class="shelf">
      <div class="shelf-head">
        <span class="sicon">✓</span>
        <h2>Auf der Liste</h2>
        <span class="count" id="shopCount"></span>
      </div>
      <div id="shoplist"></div>
      <button class="iadd" type="button" id="iaddBtn"><span class="he">＋</span> Artikel hinzufügen</button>
      <div class="addpanel" id="addPanel">
        <input type="text" placeholder="z. B. Zitronen" />
        <div class="chiprow">
          <span class="chip active">1 Stück</span><span class="chip">2 Stück</span><span class="chip">500 g</span><span class="chip">1 kg</span>
        </div>
        <div class="row">
          <button class="btn ghost" type="button" id="addCancel">Abbrechen</button>
          <button class="btn solid" type="button" disabled title="Mockup — nicht verdrahtet">Hinzufügen</button>
        </div>
      </div>
    </section>

    <section class="shelf">
      <div class="shelf-head">
        <span class="sicon">💡</span>
        <h2>Vorschläge</h2>
        <span class="count" id="suggCount"></span>
        <button class="devtoggle" id="emptyToggle" type="button">leer/voll umschalten</button>
      </div>
      <div id="suggestlist"></div>
    </section>
  </div>
  <script src="_shopping-items.js"></script>
  <script>
    document.getElementById('iaddBtn').addEventListener('click', () => document.getElementById('addPanel').classList.add('show'));
    document.getElementById('addCancel').addEventListener('click', () => document.getElementById('addPanel').classList.remove('show'));
    document.querySelectorAll('.addpanel .chip').forEach(c => c.addEventListener('click', () => {
      document.querySelectorAll('.addpanel .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    }));
    document.getElementById('emptyToggle').addEventListener('click', toggleEmptySuggestions);
  </script>
</body></html>
