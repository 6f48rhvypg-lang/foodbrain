<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Loader 4 · Building the Ratatouille</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* LOADER 4 — Building the Ratatouille (progress-flavoured):
     the chef-mouse ferries a veg slice from the crate to the Dutch oven, over
     and over; a ratatouille spiral simmers in the pot and steam curls up. */
  :root{
    --shadow-lg: 0 1px 2px rgba(35,55,40,.06), 0 30px 60px -28px rgba(35,55,40,.5);
    --fur:#b9af9f; --fur-dk:#a4998857; --belly:#ddd5c6;
    --pink:#e3a79b; --pink-dk:#cf8f83; --eggplant:#6a4a72;
    --wood:#c79a63; --wood-dk:#a87f4d; --iron:#33302e; --sauce:#9c3a29;
  }
  .wrap{ min-height:100vh; display:grid; place-items:center; padding:24px 16px 40px; }
  .sheet-demo{ width:min(440px,100%); background:var(--surface); border:1px solid var(--line);
    border-radius:24px; padding:20px 18px 22px; box-shadow:var(--shadow-lg); }
  .grip{ width:40px; height:4px; border-radius:4px; background:var(--line); margin:0 auto 16px; }
  .sheet-demo h3{ font-family:"Fraunces",serif; font-weight:600; font-size:24px; letter-spacing:-.01em; margin-bottom:4px; color:var(--ink); }
  .h3sub{ font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--ink-faint); letter-spacing:.12em; text-transform:uppercase; margin-bottom:16px; }

  .stage{ position:relative; height:152px; border-radius:16px; overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% -30%, color-mix(in srgb,var(--amber) 9%,transparent), transparent 60%),
      linear-gradient(180deg, color-mix(in srgb,var(--surface-2) 60%,var(--surface)), var(--surface-2));
    border:1px solid var(--line-soft); }
  .scene{ position:absolute; inset:0; width:100%; height:100%; }

  .mouse{ position:absolute; bottom:18px; left:6%; width:68px; height:auto;
    animation: ferry 3.6s ease-in-out infinite; will-change:left,opacity; }
  .bob{ transform-box:fill-box; transform-origin:50% 100%; animation: bob .5s ease-in-out infinite; }
  .leg-b,.leg-f{ transform-box:fill-box; transform-origin:50% 6%; animation: step .5s ease-in-out infinite; }
  .leg-f{ animation-delay:-.25s; }
  .tail{ transform-box:fill-box; transform-origin:88% 86%; animation: tailsway 1.2s ease-in-out infinite; }

  @keyframes ferry{
    0%{ left:6%; opacity:0 } 8%{ opacity:1 }
    52%{ left:52%; opacity:1 } 60%{ left:52%; opacity:0 }
    100%{ left:6%; opacity:0 }
  }
  @keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-3px) } }
  @keyframes step{ 0%,100%{ transform:rotate(18deg) } 50%{ transform:rotate(-18deg) } }
  @keyframes tailsway{ 0%,100%{ transform:rotate(-8deg) } 50%{ transform:rotate(8deg) } }

  .sl{ transform-box:fill-box; transform-origin:50% 50%; animation: simmer 2.4s ease-in-out infinite; }
  @keyframes simmer{ 0%,100%{ transform:translateY(0) scale(1); opacity:.92 } 50%{ transform:translateY(-1px) scale(1.04); opacity:1 } }
  .steam{ animation: rise 3.2s ease-in-out infinite; transform-origin:center bottom; }
  .steam.b{ animation-delay:-1.1s } .steam.c{ animation-delay:-2.1s }
  @keyframes rise{ 0%{ opacity:0; transform:translateY(6px) scaleX(.8) } 35%{ opacity:.6 } 100%{ opacity:0; transform:translateY(-20px) scaleX(1.3) } }

  .caption{ font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--ink-faint);
    letter-spacing:.12em; text-align:center; padding:16px 2px 2px; }
  .caption .d::after{ content:"…"; animation: dots 1.5s steps(4,end) infinite; }
  @keyframes dots{ 0%{content:""} 25%{content:"·"} 50%{content:"··"} 75%,100%{content:"···"} }
  .vlabel{ width:min(440px,100%); margin:14px auto 0; text-align:center; font-family:"IBM Plex Mono",monospace;
    font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }
  .vlabel b{ color:var(--ink-dim); font-weight:600; }

  @media (prefers-reduced-motion: reduce){
    .mouse{ left:30%; opacity:1; animation:none; }
    .bob,.leg-b,.leg-f,.tail,.sl,.steam{ animation:none; }
    .leg-b{ transform:rotate(13deg) } .leg-f{ transform:rotate(-13deg) } .steam{ opacity:.4 }
    .caption .d::after{ content:"…"; animation:none; }
  }
</style>
</head><body>
<div class="wrap">
  <div class="sheet-demo">
    <div class="grip"></div>
    <h3>Ratatouille köchelt</h3>
    <div class="h3sub">wird zubereitet…</div>

    <div class="stage">
      <!-- ===== static scene: crate (left), Dutch oven + ratatouille (right) ===== -->
      <svg class="scene" viewBox="0 0 360 152" preserveAspectRatio="xMidYMax meet" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- floor -->
        <path d="M0,131 L360,131" stroke="var(--line)" stroke-width="1.5"/>
        <!-- crate of veg (source) -->
        <g>
          <rect x="16" y="100" width="64" height="30" rx="4" fill="var(--wood)"/>
          <path d="M16,108 H80 M16,118 H80 M38,100 V130 M58,100 V130" stroke="var(--wood-dk)" stroke-width="1.5" opacity=".5"/>
          <circle cx="33" cy="94" r="9" fill="var(--hot)"/>
          <ellipse cx="50" cy="90" rx="8" ry="11" fill="var(--eggplant)"/>
          <rect x="58" y="86" width="20" height="11" rx="5.5" transform="rotate(-14 68 92)" fill="var(--cool)"/>
          <path d="M50,80 l2,-5 m-2,5 l-3,-4" stroke="var(--cool)" stroke-width="2" stroke-linecap="round"/>
        </g>

        <!-- steam -->
        <g stroke="var(--ink-faint)" stroke-width="3" stroke-linecap="round" fill="none">
          <path class="steam"   d="M286,96 q-5,-8 0,-15 q5,-7 0,-14"/>
          <path class="steam b" d="M298,96 q5,-8 0,-15 q-5,-7 0,-14"/>
          <path class="steam c" d="M310,96 q-5,-8 0,-14 q5,-7 0,-13"/>
        </g>

        <!-- Dutch oven -->
        <ellipse cx="298" cy="138" rx="52" ry="8" fill="var(--ink)" opacity=".12"/>
        <path d="M250,104 Q250,138 298,138 Q346,138 346,104 Z" fill="var(--iron)"/>
        <path d="M250,104 Q250,120 256,128 Q258,112 262,106 Z" fill="#fff" opacity=".06"/>
        <path d="M246,108 q-9,2 -9,10 q0,8 9,9" stroke="var(--iron)" stroke-width="6" stroke-linecap="round"/>
        <path d="M350,108 q9,2 9,10 q0,8 -9,9" stroke="var(--iron)" stroke-width="6" stroke-linecap="round"/>
        <ellipse cx="298" cy="104" rx="50" ry="11" fill="#26231f"/>
        <ellipse cx="298" cy="103" rx="43" ry="8.5" fill="var(--sauce)"/>
        <!-- ratatouille spiral (outer ring, inner ring, centre) -->
        <g>
          <ellipse class="sl" cx="330" cy="100" rx="7" ry="6" fill="var(--hot)"      style="animation-delay:-.0s"/>
          <ellipse class="sl" cx="325" cy="105" rx="7" ry="6" fill="var(--cool)"     style="animation-delay:-.2s"/>
          <ellipse class="sl" cx="314" cy="108" rx="7" ry="6" fill="var(--eggplant)" style="animation-delay:-.4s"/>
          <ellipse class="sl" cx="298" cy="109" rx="7" ry="6" fill="var(--warm)"     style="animation-delay:-.6s"/>
          <ellipse class="sl" cx="282" cy="108" rx="7" ry="6" fill="var(--hot)"      style="animation-delay:-.8s"/>
          <ellipse class="sl" cx="271" cy="105" rx="7" ry="6" fill="var(--cool)"     style="animation-delay:-1s"/>
          <ellipse class="sl" cx="266" cy="100" rx="7" ry="6" fill="var(--eggplant)" style="animation-delay:-1.2s"/>
          <ellipse class="sl" cx="271" cy="96"  rx="7" ry="6" fill="var(--warm)"     style="animation-delay:-1.4s"/>
          <ellipse class="sl" cx="282" cy="93"  rx="7" ry="6" fill="var(--hot)"      style="animation-delay:-1.6s"/>
          <ellipse class="sl" cx="298" cy="92"  rx="7" ry="6" fill="var(--cool)"     style="animation-delay:-1.8s"/>
          <ellipse class="sl" cx="314" cy="93"  rx="7" ry="6" fill="var(--eggplant)" style="animation-delay:-2s"/>
          <ellipse class="sl" cx="325" cy="96"  rx="7" ry="6" fill="var(--warm)"     style="animation-delay:-2.2s"/>
          <ellipse class="sl" cx="312" cy="100" rx="6" ry="5" fill="var(--hot)"      style="animation-delay:-.5s"/>
          <ellipse class="sl" cx="304" cy="104" rx="6" ry="5" fill="var(--cool)"     style="animation-delay:-.9s"/>
          <ellipse class="sl" cx="290" cy="104" rx="6" ry="5" fill="var(--warm)"     style="animation-delay:-1.3s"/>
          <ellipse class="sl" cx="284" cy="100" rx="6" ry="5" fill="var(--eggplant)" style="animation-delay:-1.7s"/>
          <ellipse class="sl" cx="290" cy="96"  rx="6" ry="5" fill="var(--hot)"      style="animation-delay:-2.1s"/>
          <ellipse class="sl" cx="304" cy="96"  rx="6" ry="5" fill="var(--cool)"     style="animation-delay:-.3s"/>
          <ellipse class="sl" cx="298" cy="100" rx="6" ry="5.5" fill="var(--warm)"   style="animation-delay:-1.5s"/>
        </g>
      </svg>

      <!-- ===== the ferrying chef-mouse (carries a slice to the pot) ===== -->
      <svg class="mouse" viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="tail"><path d="M64,150 C40,162 28,136 42,124 C51,116 60,126 53,133" stroke="var(--pink-dk)" stroke-width="5.5" stroke-linecap="round"/></g>
        <g class="leg-b"><rect x="60" y="150" width="11" height="30" rx="5.5" fill="var(--fur)"/><ellipse cx="63" cy="183" rx="9" ry="5.5" fill="var(--pink)"/></g>
        <g class="bob">
          <path d="M62,152 C55,128 58,99 71,87 C77,81 85,81 91,87 C104,99 107,128 100,152 C90,160 72,160 62,152 Z" fill="var(--fur)"/>
          <path d="M70,150 C66,132 67,110 76,101 C82,96 88,100 90,110 C93,128 90,146 86,151 C81,155 74,155 70,150 Z" fill="var(--belly)" opacity=".7"/>
          <path d="M70,104 C70,100 90,100 90,104 L92,138 C92,147 68,147 68,138 Z" fill="var(--accent)"/>
          <circle cx="96" cy="58" r="9" fill="var(--fur-dk)"/>
          <circle cx="80" cy="71" r="23" fill="var(--fur)"/>
          <path d="M97,67 C113,64 121,73 118,80 C115,85 102,84 96,79 Z" fill="var(--fur)"/>
          <circle cx="117" cy="76" r="3.4" fill="var(--ink)"/>
          <circle cx="92" cy="67" r="3" fill="var(--ink)"/><circle cx="93.3" cy="65.8" r="1" fill="#fff"/>
          <circle cx="101" cy="76" r="5" fill="var(--pink)" opacity=".4"/>
          <circle cx="69" cy="47" r="15" fill="var(--fur)"/><circle cx="69" cy="49" r="8.5" fill="var(--pink)"/>
          <rect x="59" y="40" width="42" height="13" rx="6.5" fill="var(--surface)" stroke="var(--line)" stroke-width="1"/>
          <circle cx="65" cy="30" r="11" fill="var(--surface)" stroke="var(--line-soft)" stroke-width="1"/>
          <circle cx="80" cy="24" r="13" fill="var(--surface)" stroke="var(--line-soft)" stroke-width="1"/>
          <circle cx="94" cy="30" r="10" fill="var(--surface)" stroke="var(--line-soft)" stroke-width="1"/>
          <rect x="59" y="40" width="42" height="7" rx="3.5" fill="var(--surface)"/>
          <!-- arms cradle a single veg slice -->
          <path d="M71,96 C64,103 67,111 76,114" stroke="var(--fur)" stroke-width="8.5" stroke-linecap="round"/>
          <path d="M95,93 C103,100 101,110 91,114" stroke="var(--fur)" stroke-width="8.5" stroke-linecap="round"/>
          <ellipse cx="83" cy="106" rx="12" ry="11" fill="var(--eggplant)"/>
          <ellipse cx="83" cy="106" rx="6.5" ry="6" fill="#86627f"/>
          <ellipse cx="73" cy="112" rx="6" ry="5" fill="var(--pink)"/><ellipse cx="93" cy="112" rx="6" ry="5" fill="var(--pink)"/>
        </g>
        <g class="leg-f"><rect x="89" y="150" width="11" height="30" rx="5.5" fill="var(--fur)"/><ellipse cx="97" cy="183" rx="9" ry="5.5" fill="var(--pink)"/></g>
      </svg>
    </div>

    <div class="caption">schreibe das Rezept<span class="d"></span></div>
  </div>
  <div class="vlabel"><b>Loader 4</b> · Building the Ratatouille</div>
</div>
</body></html>
