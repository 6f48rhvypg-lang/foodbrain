<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>V1 · Calm Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* VARIATION V1 — Calm Minimal:
     soft green header on a card, generous air, the two actions as two
     equal rounded buttons; everything breathes. */
  .app { padding-top:26px; }
  header {
    background:var(--green); color:var(--on-green); border-radius:24px;
    padding:22px 20px 24px; box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  header::after {
    content:""; position:absolute; right:-40px; top:-50px; width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle, color-mix(in srgb,var(--amber) 22%,transparent), transparent 70%);
  }
  .toprow { display:flex; align-items:flex-start; }
  h1 {
    font-family:"Fraunces",serif; font-optical-sizing:auto; font-weight:600;
    font-size:clamp(30px,8.5vw,40px); line-height:1.02; letter-spacing:-.02em; color:var(--head-title);
    flex:1;
  }
  .actionrow { display:flex; gap:12px; margin-top:22px; }
  .act {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    border-radius:16px; padding:15px 10px; cursor:pointer;
    font-family:"Hanken Grotesk",sans-serif; font-weight:700; font-size:14px;
  }
  .act .sym { font-size:26px; line-height:1; font-weight:400; }
  .act.add  { background:var(--amber); color:var(--amber-ink); }
  .act.edit { background:var(--panel-soft); color:var(--on-green); border:1px solid var(--panel-line); }
  .searchwrap { margin-top:20px; }
  .toolbar { margin-top:16px; }
</style>
</head><body>
  <div class="app">
    <header>
      <div class="toprow">
        <h1>Was haben<br>wir?</h1>
        <button class="iconbtn" title="Mehr">⋯</button>
      </div>
      <div class="actionrow">
        <button class="act add"><span class="sym">+</span>Einräumen</button>
        <button class="act edit"><span class="sym">−</span>Verbrauchen</button>
      </div>
    </header>

    <div class="searchwrap">
      <span class="si">⌕</span>
      <input class="search" placeholder="Suchen …" />
    </div>

    <div class="toolbar">
      <button class="sortpill">Sortieren: <span class="cur">Fällig zuerst</span> <span class="chev">▾</span></button>
      <button class="combinebtn">✦ Kombinieren</button>
    </div>

    <main id="shelves"></main>
  </div>
  <script src="_items.js"></script>
</body></html>
