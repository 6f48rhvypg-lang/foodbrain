<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<title>Cook confirm · D — One at a time</title>
<style>
:root{--bg-0:#f1e7d8;--bg-1:#f6eee2;--bg-2:#fbf4e9;--surface:#fff;--surface-2:#faf5ec;--ink:#243528;--ink-dim:#647264;--ink-faint:#9aa494;--line:rgba(40,70,50,.12);--line-soft:rgba(40,70,50,.07);--accent:#44694e;--accent-ink:#f4fbf2;--accent-bg:#e7efe7;--amber:#ef8e4e;--amber-ink:#3a2410;--amber-bg:#fbe7d4;--shadow:0 18px 50px rgba(40,60,45,.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;color:var(--ink);background:radial-gradient(120% 80% at 50% -10%,var(--bg-2),transparent 55%),linear-gradient(180deg,var(--bg-1),var(--bg-0));min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:390px;margin:0 auto}
.backdrop{padding:15px 22px 5px;display:flex;justify-content:space-between;align-items:center;font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);opacity:.5}
.sheet{background:var(--surface);border:1px solid var(--line);border-bottom:none;border-radius:24px 24px 0 0;padding:16px 18px 26px;box-shadow:var(--shadow);min-height:100vh}
.grip{width:40px;height:4px;border-radius:4px;background:var(--line);margin:2px auto 12px}
.htitle{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);text-align:center;margin-bottom:14px}
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:8px}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--line)}
.dots i.done{background:var(--accent)}
.dots i.now{background:var(--accent);box-shadow:0 0 0 4px var(--accent-bg)}
.prog{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--ink-faint);text-align:center;margin-bottom:26px}
.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:28px 20px 22px;box-shadow:0 10px 30px rgba(40,60,45,.08);margin:0 4px}
.card::before{content:"";position:absolute;left:14px;right:14px;top:-9px;height:18px;background:var(--surface-2);border:1px solid var(--line-soft);border-bottom:none;border-radius:18px 18px 0 0;z-index:-1}
.bigemoji{font-size:54px;text-align:center;line-height:1;margin-bottom:10px}
.bigname{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:26px;text-align:center;margin-bottom:3px}
.stock{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-faint);text-align:center;margin-bottom:20px}
.q{font-size:15px;font-weight:600;text-align:center;color:var(--ink-dim);margin-bottom:14px}
.opt{display:block;width:100%;cursor:pointer;border:1.5px solid var(--line);background:var(--surface);border-radius:14px;padding:15px 16px;margin-bottom:9px;font:inherit;font-size:15.5px;font-weight:600;color:var(--ink);text-align:left;display:flex;align-items:center;gap:11px}
.opt .lead{width:13px;height:13px;border-radius:50%;border:2px solid var(--line);flex:none}
.opt small{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:10.5px;font-weight:500;color:var(--ink-faint)}
.opt.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.opt.on .lead{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 2.5px #fff}
.opt.on small{color:var(--accent)}
.tools{display:flex;justify-content:center;gap:18px;margin-top:16px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-dim)}
.tools a{color:var(--ink-dim);text-decoration:underline;text-underline-offset:2px}
.swipe{text-align:center;margin-top:22px;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
</style></head>
<body><div class="app">
<div class="backdrop"><span>was haben jetzt</span><span>×</span></div>
<div class="sheet">
  <div class="grip"></div>
  <div class="htitle">Nduja-Linsen-Pfanne · verbrauch prüfen</div>
  <div class="dots"><i class="done"></i><i class="now"></i><i></i><i></i><i></i></div>
  <div class="prog">2 von 5</div>

  <div class="card">
    <div class="bigemoji">🧅</div>
    <div class="bigname">Zwiebeln</div>
    <div class="stock">im Vorrat: 6 Stück</div>
    <div class="q">Wie viel ist noch übrig?</div>
    <button class="opt"><span class="lead"></span>alles aufgebraucht</button>
    <button class="opt"><span class="lead"></span>nur ein Rest übrig</button>
    <button class="opt"><span class="lead"></span>die Hälfte übrig</button>
    <button class="opt on"><span class="lead"></span>fast alles noch da<small>≈ 5 Stück</small></button>
    <div class="tools"><a>genau eingeben ›</a><a>überspringen</a></div>
  </div>

  <div class="swipe">← wischen für nächste Zutat →</div>
</div>
</div></body></html>
