<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Konzept D · Koch-Hub (sanft)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* KONZEPT D — KOCH-HUB (sanfte Evolution)
     Keeps today's familiar shape (eyebrow + search with inline +/-), but the
     four equal toolbar pills become TWO: one "Kochen ▾" hub that opens Ideen /
     Kombinieren / Meine Rezepte, plus the existing Sortieren pill. Lowest risk. */
  .app { padding-top:16px; }
  .concept-tag {
    font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-faint); margin:0 4px 12px; opacity:.8;
  }
  .eyebrow { display:flex; align-items:center; gap:8px; padding:0 4px; margin-bottom:12px; }
  .eyebrow h1 { font-family:"Fraunces",serif; font-weight:600; font-size:22px; color:var(--ink); flex:1; letter-spacing:-.01em; }
  .eyebrow .iconbtn { width:32px; height:32px; font-size:15px; background:var(--surface); border:1px solid var(--line); color:var(--ink-dim); }

  .searchrow { display:flex; gap:10px; align-items:center; }
  .searchrow .searchwrap { flex:1; }
  .searchrow .search { font-size:16px; padding:14px 14px 14px 42px; border-radius:15px; }
  .searchrow .si { font-size:17px; left:15px; }
  .rbtn { width:46px; height:46px; flex:0 0 auto; border-radius:14px; cursor:pointer; border:none;
    font-size:24px; font-weight:300; line-height:1; display:grid; place-items:center; box-shadow:var(--shadow); }
  .rbtn.add { background:var(--amber); color:var(--amber-ink); }
  .rbtn.edit { background:var(--green); color:var(--on-green); }

  /* two pills instead of four */
  .toolbar { margin-top:13px; display:flex; align-items:center; gap:10px; }
  .cookhub { cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    font-family:"Hanken Grotesk",sans-serif; font-weight:700; font-size:13.5px;
    color:var(--accent-ink); background:var(--accent); border:1.5px solid var(--accent);
    border-radius:999px; padding:10px 16px; box-shadow:var(--shadow); }
  .cookhub .ci { font-size:16px; }
  .cookhub .chev { font-size:10px; opacity:.8; }
  .sortpill { margin-left:auto; }

  /* a tiny preview of the merged menu the hub opens */
  .hubmenu { margin-top:11px; align-self:flex-start; display:inline-flex; gap:6px; flex-wrap:wrap; padding:0 2px; }
  .hubmenu .mi { font-family:"IBM Plex Mono",monospace; font-size:10.5px; letter-spacing:.04em;
    color:var(--ink-faint); background:var(--surface-2); border:1px solid var(--line-soft);
    border-radius:999px; padding:6px 11px; }
  .toolwrap { display:flex; flex-direction:column; }

  .shelf:first-of-type { margin-top:18px; }
</style>
</head><body>
  <div class="app">
    <div class="concept-tag">Konzept D — Koch-Hub (sanfte Evolution)</div>
    <header>
      <div class="eyebrow">
        <h1>Was haben wir?</h1>
        <button class="iconbtn" title="Sync">↻</button>
        <button class="iconbtn" title="Mehr">⋯</button>
      </div>
      <div class="searchrow">
        <div class="searchwrap">
          <span class="si">⌕</span>
          <input class="search" placeholder="Suchen … (z. B. Milch)" />
        </div>
        <button class="rbtn add" title="Einräumen">+</button>
        <button class="rbtn edit" title="Verbrauchen">−</button>
      </div>
    </header>

    <div class="toolwrap">
      <div class="toolbar">
        <button class="cookhub"><span class="ci">🍳</span> Kochen <span class="chev">▾</span></button>
        <button class="sortpill">Sortieren: <span class="cur">Fällig zuerst</span> <span class="chev">▾</span></button>
      </div>
      <div class="hubmenu">
        <span class="mi">💡 Ideen holen</span>
        <span class="mi">✦ Kombinieren</span>
        <span class="mi">📖 Meine Rezepte</span>
      </div>
    </div>

    <main id="shelves"></main>
  </div>
  <script src="_items.js"></script>
</body></html>
