<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shopping 0 · Home-Entry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* KONZEPT 0 — Home-Entry:
     the resolved nav decision, not an open question: a second full-width
     hero stacked directly under 🍳 cookHero, same visual weight, own
     gradient pairing (warm→hot; cookHero keeps accent→green-deep) so the
     two hero CTAs read as siblings, not a split single button. Tapping it
     goes straight to the list screen — no hub sheet, shopping only has
     two destinations (list, settings via ⋯). Ported from the real
     fridge-now.html .cookhero/.hubopt rules (not in _base.css yet). */
  .app { padding-top:16px; }
  .concept-tag {
    font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-faint); margin:0 4px 12px; opacity:.8;
  }
  .eyebrow { display:flex; align-items:center; gap:8px; padding:0 4px; margin-bottom:12px; }
  .eyebrow h1 { font-family:"Fraunces",serif; font-weight:600; font-size:22px; color:var(--ink); flex:1; letter-spacing:-.01em; }
  .eyebrow .iconbtn { width:32px; height:32px; font-size:15px; background:var(--surface); border:1px solid var(--line); color:var(--ink-dim); }

  .searchrow { display:flex; gap:10px; align-items:center; }
  .searchrow .searchwrap { flex:1; }
  .searchrow .search { font-size:16px; padding:14px 14px 14px 42px; border-radius:15px; }
  .searchrow .si { font-size:17px; left:15px; }
  .rbtn { width:46px; height:46px; flex:0 0 auto; border-radius:14px; cursor:pointer; border:none;
    font-size:24px; font-weight:300; line-height:1; display:grid; place-items:center; box-shadow:var(--shadow); }
  .rbtn.add { background:var(--amber); color:var(--amber-ink); }
  .rbtn.edit { background:var(--green); color:var(--on-green); }

  /* ---- the two hero CTAs (ported from fridge-now.html:259-270) ---- */
  .cookhero {
    width:100%; margin:14px 0 0; border:none; cursor:pointer;
    border-radius:16px; box-shadow:var(--shadow);
    background:linear-gradient(110deg, var(--accent), var(--green-deep)); color:var(--accent-ink);
    font-family:"Hanken Grotesk",sans-serif; font-weight:700; font-size:15.5px;
    display:flex; align-items:center; justify-content:center; gap:10px; padding:15px;
    transition:filter .18s var(--ease), transform .12s var(--ease);
  }
  .cookhero:hover { filter:brightness(1.05); }
  .cookhero:active { transform:scale(.99); }
  .cookhero .ci { font-size:18px; line-height:1; }
  .cookhero .csub { font-weight:500; font-size:12px; opacity:.72; }

  .shophero {
    background:linear-gradient(110deg, var(--warm), var(--hot)); color:var(--accent-ink);
  }
  .shophero .csub { display:flex; align-items:center; gap:5px; opacity:.9; }
  .shophero .cdot {
    width:6px; height:6px; border-radius:50%; background:var(--accent-ink); opacity:.85;
    box-shadow:0 0 0 3px color-mix(in srgb, var(--accent-ink) 25%, transparent);
  }

  .hint {
    text-align:center; margin-top:26px;
    font-family:"IBM Plex Mono",monospace; font-size:10.5px;
    color:var(--ink-faint); letter-spacing:.1em;
  }
  .items { gap:8px; margin-top:18px; }
  .item { padding:10px 13px; column-gap:12px; }
  .item.tabpad { padding-top:18px; }
  .thumb { width:42px; height:42px; border-radius:13px; font-size:22px; }
  .item .name { font-size:15.5px; }
</style>
</head><body>
  <div class="app">
    <div class="concept-tag">Konzept 0 — Home-Entry</div>

    <div class="eyebrow">
      <h1>Was haben wir?</h1>
      <button class="iconbtn" type="button" title="Jetzt synchronisieren" aria-label="Jetzt synchronisieren">↻</button>
      <button class="iconbtn" type="button" title="Mehr" aria-label="Mehr">⋯</button>
    </div>
    <div class="searchrow">
      <div class="searchwrap">
        <span class="si">⌕</span>
        <input class="search" type="search" placeholder="Suchen … (z. B. Milch)" aria-label="Vorrat durchsuchen" />
      </div>
      <button class="rbtn add" type="button" title="Einräumen" aria-label="Einräumen">+</button>
      <button class="rbtn edit" type="button" title="Verbrauchen" aria-label="Verbrauchen">−</button>
    </div>

    <button class="cookhero" type="button" title="Koch-Ideen, Kombinieren &amp; Rezepte">
      <span class="ci">🍳</span><span>Was sollen wir kochen?</span><span class="csub">Ideen · Rezepte</span>
    </button>

    <button class="cookhero shophero" type="button" title="Einkaufsliste öffnen">
      <span class="ci">🛒</span><span>Einkaufsliste</span>
      <span class="csub"><span class="cdot"></span><span id="heroCount">6 auf der Liste · 5 Vorschläge</span></span>
    </button>

    <main id="shelves"><!-- rendered by _items.js, unrelated fridge preview --></main>

    <div class="hint">tipp einen Artikel an für Aktionen · 🍳 für Koch-Ideen · 🛒 für die Einkaufsliste</div>
  </div>
  <script src="_items.js"></script>
  <script src="_shopping-items.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const n = document.getElementById('heroCount');
      if (n) n.textContent = `${ITEMS.length} auf der Liste · ${SUGGESTIONS.length} Vorschläge`;
    });
  </script>
</body></html>
