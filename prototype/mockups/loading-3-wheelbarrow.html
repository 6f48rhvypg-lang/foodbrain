<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Loader 3 · Wheelbarrow Haul</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* LOADER 3 — Wheelbarrow Haul:
     the chef-mouse pushes a wooden barrow piled with ratatouille veg across
     the screen. The wheel spins, the load jiggles, little legs stride. */
  :root{
    --shadow-lg: 0 1px 2px rgba(35,55,40,.06), 0 30px 60px -28px rgba(35,55,40,.5);
    --fur:#b9af9f; --fur-dk:#a4998857; --belly:#ddd5c6;
    --pink:#e3a79b; --pink-dk:#cf8f83; --eggplant:#6a4a72;
    --wood:#c79a63; --wood-dk:#a87f4d;
  }
  .wrap{ min-height:100vh; display:grid; place-items:center; padding:24px 16px 40px; }
  .sheet-demo{ width:min(440px,100%); background:var(--surface); border:1px solid var(--line);
    border-radius:24px; padding:20px 18px 22px; box-shadow:var(--shadow-lg); }
  .grip{ width:40px; height:4px; border-radius:4px; background:var(--line); margin:0 auto 16px; }
  .sheet-demo h3{ font-family:"Fraunces",serif; font-weight:600; font-size:24px; letter-spacing:-.01em; margin-bottom:4px; color:var(--ink); }
  .h3sub{ font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--ink-faint); letter-spacing:.12em; text-transform:uppercase; margin-bottom:16px; }

  .stage{ position:relative; height:152px; border-radius:16px; overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% -30%, color-mix(in srgb,var(--amber) 9%,transparent), transparent 60%),
      linear-gradient(180deg, color-mix(in srgb,var(--surface-2) 60%,var(--surface)), var(--surface-2));
    border:1px solid var(--line-soft); }
  .floor{ position:absolute; left:0; right:0; bottom:26px; height:2px;
    background:linear-gradient(90deg,transparent,var(--line),transparent); }

  .rig{ position:absolute; bottom:16px; left:-176px; width:172px; height:auto;
    animation: cross 6s linear infinite; will-change:left; }
  .bob{ transform-box:fill-box; transform-origin:50% 100%; animation: trundle .5s ease-in-out infinite; }
  .leg-b,.leg-f{ transform-box:fill-box; transform-origin:50% 6%; animation: step .5s ease-in-out infinite; }
  .leg-f{ animation-delay:-.25s; }
  .wheel{ transform-box:fill-box; transform-origin:50% 50%; animation: roll 1s linear infinite; }
  .load{ transform-box:fill-box; transform-origin:50% 100%; animation: jiggle .5s ease-in-out infinite; }
  .tail{ transform-box:fill-box; transform-origin:88% 86%; animation: tailsway 1.2s ease-in-out infinite; }

  @keyframes cross{ from{ left:-176px } to{ left:calc(100% + 30px) } }
  @keyframes trundle{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-2px) } }
  @keyframes step{ 0%,100%{ transform:rotate(20deg) } 50%{ transform:rotate(-20deg) } }
  @keyframes roll{ to{ transform:rotate(360deg) } }
  @keyframes jiggle{ 0%,100%{ transform:rotate(-1.6deg) } 50%{ transform:rotate(1.6deg) } }
  @keyframes tailsway{ 0%,100%{ transform:rotate(-8deg) } 50%{ transform:rotate(8deg) } }

  .caption{ font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--ink-faint);
    letter-spacing:.12em; text-align:center; padding:16px 2px 2px; }
  .caption .d::after{ content:"…"; animation: dots 1.5s steps(4,end) infinite; }
  @keyframes dots{ 0%{content:""} 25%{content:"·"} 50%{content:"··"} 75%,100%{content:"···"} }
  .vlabel{ width:min(440px,100%); margin:14px auto 0; text-align:center; font-family:"IBM Plex Mono",monospace;
    font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }
  .vlabel b{ color:var(--ink-dim); font-weight:600; }

  @media (prefers-reduced-motion: reduce){
    .rig{ left:calc(50% - 86px); animation:none; }
    .bob,.leg-b,.leg-f,.wheel,.load,.tail{ animation:none; }
    .leg-b{ transform:rotate(14deg) } .leg-f{ transform:rotate(-14deg) }
    .caption .d::after{ content:"…"; animation:none; }
  }
</style>
</head><body>
<div class="wrap">
  <div class="sheet-demo">
    <div class="grip"></div>
    <h3>Frische Fuhre</h3>
    <div class="h3sub">wird zubereitet…</div>

    <div class="stage">
      <div class="floor"></div>

      <!-- mouse + wheelbarrow rig · viewBox 250×200 -->
      <svg class="rig" viewBox="0 0 250 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ===== barrow (right) ===== -->
        <!-- handles -->
        <path d="M104,126 L150,120" stroke="var(--wood-dk)" stroke-width="6" stroke-linecap="round"/>
        <path d="M104,134 L150,132" stroke="var(--wood-dk)" stroke-width="6" stroke-linecap="round"/>
        <!-- bin -->
        <path d="M132,114 L222,114 L208,150 L150,150 Z" fill="var(--wood)"/>
        <path d="M132,114 L222,114 L218,122 L134,122 Z" fill="var(--wood-dk)" opacity=".55"/>
        <!-- front strut -->
        <path d="M204,150 L210,166" stroke="var(--wood-dk)" stroke-width="5" stroke-linecap="round"/>
        <path d="M158,150 L150,166" stroke="var(--wood-dk)" stroke-width="5" stroke-linecap="round"/>
        <!-- load of ratatouille veg -->
        <g class="load">
          <ellipse cx="168" cy="104" rx="9" ry="13" fill="var(--eggplant)"/>
          <path d="M168,93 l2,-5 m-2,5 l-3,-4" stroke="var(--cool)" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="150" cy="106" r="11" fill="var(--hot)"/>
          <path d="M150,96 l2,-4 m-2,4 l-3,-3 m3,3 l4,-1" stroke="var(--cool)" stroke-width="2.2" stroke-linecap="round"/>
          <rect x="183" y="98" width="22" height="13" rx="6.5" transform="rotate(-12 194 104)" fill="var(--cool)"/>
          <circle cx="205" cy="110" r="9" fill="var(--warm)"/>
          <path d="M196,116 C200,124 208,124 212,116" stroke="var(--cool)" stroke-width="3" stroke-linecap="round" fill="none"/>
        </g>
        <!-- wheel -->
        <g class="wheel">
          <circle cx="183" cy="156" r="16" fill="var(--ink)" opacity=".82"/>
          <circle cx="183" cy="156" r="16" fill="none" stroke="var(--wood-dk)" stroke-width="3"/>
          <circle cx="183" cy="156" r="5.5" fill="var(--wood)"/>
          <path d="M183,142 L183,170 M169,156 L197,156 M173,146 L193,166 M193,146 L173,166" stroke="var(--surface-2)" stroke-width="2" opacity=".7"/>
        </g>

        <!-- ===== mouse (left) · pushing ===== -->
        <g class="tail"><path d="M58,150 C34,162 22,136 36,124 C45,116 54,126 47,133" stroke="var(--pink-dk)" stroke-width="5.5" stroke-linecap="round"/></g>
        <g class="leg-b"><rect x="56" y="150" width="11" height="30" rx="5.5" fill="var(--fur)"/><ellipse cx="59" cy="183" rx="9" ry="5.5" fill="var(--pink)"/></g>
        <g class="bob">
          <path d="M56,152 C49,128 52,99 65,87 C71,81 79,81 85,87 C98,99 101,128 94,152 C84,160 66,160 56,152 Z" fill="var(--fur)"/>
          <path d="M64,150 C60,132 61,110 70,101 C76,96 82,100 84,110 C87,128 84,146 80,151 C75,155 68,155 64,150 Z" fill="var(--belly)" opacity=".7"/>
          <path d="M64,104 C64,100 84,100 84,104 L86,138 C86,147 62,147 62,138 Z" fill="var(--accent)"/>
          <circle cx="90" cy="58" r="9" fill="var(--fur-dk)"/>
          <circle cx="74" cy="71" r="23" fill="var(--fur)"/>
          <path d="M91,67 C107,64 115,73 112,80 C109,85 96,84 90,79 Z" fill="var(--fur)"/>
          <circle cx="111" cy="76" r="3.4" fill="var(--ink)"/>
          <circle cx="86" cy="67" r="3" fill="var(--ink)"/><circle cx="87.3" cy="65.8" r="1" fill="#fff"/>
          <circle cx="95" cy="76" r="5" fill="var(--pink)" opacity=".4"/>
          <circle cx="63" cy="47" r="15" fill="var(--fur)"/><circle cx="63" cy="49" r="8.5" fill="var(--pink)"/>
          <rect x="53" y="40" width="42" height="13" rx="6.5" fill="var(--surface)" stroke="var(--line)" stroke-width="1"/>
          <circle cx="59" cy="30" r="11" fill="var(--surface)" stroke="var(--line-soft)" stroke-width="1"/>
          <circle cx="74" cy="24" r="13" fill="var(--surface)" stroke="var(--line-soft)" stroke-width="1"/>
          <circle cx="88" cy="30" r="10" fill="var(--surface)" stroke="var(--line-soft)" stroke-width="1"/>
          <rect x="53" y="40" width="42" height="7" rx="3.5" fill="var(--surface)"/>
          <!-- arms reaching to the handles -->
          <path d="M84,98 C94,108 100,118 104,126" stroke="var(--fur)" stroke-width="8.5" stroke-linecap="round"/>
          <path d="M80,108 C90,118 98,128 104,134" stroke="var(--fur)" stroke-width="8.5" stroke-linecap="round"/>
          <ellipse cx="104" cy="127" rx="5.5" ry="5" fill="var(--pink)"/>
          <ellipse cx="104" cy="135" rx="5.5" ry="5" fill="var(--pink)"/>
        </g>
        <g class="leg-f"><rect x="80" y="150" width="11" height="30" rx="5.5" fill="var(--fur)"/><ellipse cx="88" cy="183" rx="9" ry="5.5" fill="var(--pink)"/></g>
      </svg>
    </div>

    <div class="caption">schreibe das Rezept<span class="d"></span></div>
  </div>
  <div class="vlabel"><b>Loader 3</b> · Wheelbarrow Haul</div>
</div>
</body></html>
