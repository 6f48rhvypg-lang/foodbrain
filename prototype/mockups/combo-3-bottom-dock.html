<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Konzept C · Bodenleiste</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* KONZEPT C — BODENLEISTE (THUMB DOCK)
     The top becomes calm and content-first: title + search only. Every action
     moves into a fixed bottom dock in the thumb zone — Einräumen / Verbrauchen /
     Kochen as three equal docks. Sort is a quiet chip on the search row. */
  .app { padding-top:16px; padding-bottom:104px; }
  .concept-tag {
    font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-faint); margin:0 4px 12px; opacity:.8;
  }
  .eyebrow { display:flex; align-items:center; gap:8px; padding:0 4px; margin-bottom:12px; }
  .eyebrow h1 { font-family:"Fraunces",serif; font-weight:600; font-size:23px; color:var(--ink); flex:1; letter-spacing:-.01em; }
  .eyebrow .iconbtn { background:var(--surface); border:1px solid var(--line); color:var(--ink-dim); }

  .searchrow { display:flex; align-items:center; gap:10px; }
  .searchrow .searchwrap { flex:1; }
  .searchrow .search { font-size:16px; padding:15px 14px 15px 42px; border-radius:15px; }
  .searchrow .si { font-size:17px; left:15px; }
  .sortmini { flex:0 0 auto; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
    font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--ink-dim); font-weight:600;
    background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:9px 12px; box-shadow:var(--shadow); }

  .shelf:first-of-type { margin-top:16px; }

  /* fixed bottom dock */
  .dock {
    position:fixed; left:0; right:0; bottom:0; z-index:5;
    display:flex; gap:10px; max-width:560px; margin:0 auto; padding:12px 16px 22px;
    background:linear-gradient(180deg, transparent, var(--bg-0) 38%);
  }
  .dock button { flex:1; border:none; cursor:pointer; border-radius:16px; box-shadow:var(--shadow);
    padding:12px 6px; font-family:"Hanken Grotesk",sans-serif; font-weight:700; font-size:12.5px;
    display:flex; flex-direction:column; align-items:center; gap:5px; }
  .dock .gly { font-size:21px; line-height:1; }
  .dock .add  { background:var(--amber); color:var(--amber-ink); }
  .dock .rem  { background:var(--surface); color:var(--green); border:1.5px solid var(--green); }
  .dock .cook { background:var(--accent); color:var(--accent-ink); }
</style>
</head><body>
  <div class="app">
    <div class="concept-tag">Konzept C — Bodenleiste (Daumen-Dock)</div>
    <header>
      <div class="eyebrow">
        <h1>Was haben wir?</h1>
        <button class="iconbtn" title="Mehr · Sync · Thema">⋯</button>
      </div>
      <div class="searchrow">
        <div class="searchwrap">
          <span class="si">⌕</span>
          <input class="search" placeholder="Suchen … (z. B. Milch)" />
        </div>
        <button class="sortmini">Fällig ▾</button>
      </div>
    </header>

    <main id="shelves"></main>
  </div>

  <nav class="dock">
    <button class="add"><span class="gly">＋</span> Einräumen</button>
    <button class="rem"><span class="gly">－</span> Verbrauchen</button>
    <button class="cook"><span class="gly">🍳</span> Kochen</button>
  </nav>

  <script src="_items.js"></script>
</body></html>
