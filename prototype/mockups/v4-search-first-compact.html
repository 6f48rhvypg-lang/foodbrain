<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>V4 · Search-First Compact</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="_base.css" />
<style>
  /* VARIATION V4 — Search-First Compact:
     find-as-you-type is the hero — a large search field right at the top
     with the + / − tucked inline as round buttons. Tighter rows, more list
     on screen. Title shrinks to a quiet eyebrow. */
  .app { padding-top:18px; }
  .eyebrow {
    font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-faint); display:flex; align-items:center; gap:8px; padding:0 4px; margin-bottom:12px;
  }
  .eyebrow h1 { font:inherit; color:var(--ink-dim); font-weight:600; flex:1; }
  .eyebrow .iconbtn { width:30px; height:30px; font-size:14px; background:var(--surface); border:1px solid var(--line); color:var(--ink-dim); }

  .searchrow { display:flex; gap:10px; align-items:center; }
  .searchrow .searchwrap { flex:1; }
  .searchrow .search {
    font-size:17px; padding:16px 14px 16px 44px; border-radius:16px;
  }
  .searchrow .si { font-size:18px; left:15px; }
  .rbtn {
    width:50px; height:50px; flex:0 0 auto; border-radius:15px; cursor:pointer; border:none;
    font-size:26px; font-weight:300; line-height:1; display:grid; place-items:center; box-shadow:var(--shadow);
  }
  .rbtn.add  { background:var(--amber); color:var(--amber-ink); }
  .rbtn.edit { background:var(--green); color:var(--on-green); }

  .toolbar { margin-top:14px; }

  /* compact cards */
  .shelf { margin-top:18px; }
  .items { gap:7px; }
  .item { padding:9px 12px; column-gap:11px; }
  .item.tabpad { padding-top:16px; }
  .thumb { width:38px; height:38px; border-radius:11px; font-size:20px; }
  .item .name { font-size:15px; }
  .item .meta { margin-top:2px; }
</style>
</head><body>
  <div class="app">
    <div class="eyebrow">
      <h1>Was haben wir?</h1>
      <button class="iconbtn" title="Mehr">⋯</button>
    </div>

    <div class="searchrow">
      <div class="searchwrap">
        <span class="si">⌕</span>
        <input class="search" placeholder="Suchen … (z. B. Milch)" />
      </div>
      <button class="rbtn add" title="Einräumen">+</button>
      <button class="rbtn edit" title="Verbrauchen">−</button>
    </div>

    <div class="toolbar">
      <button class="sortpill">Sortieren: <span class="cur">Fällig zuerst</span> <span class="chev">▾</span></button>
      <button class="combinebtn">✦ Kombinieren</button>
    </div>

    <main id="shelves"></main>
  </div>
  <script src="_items.js"></script>
</body></html>
