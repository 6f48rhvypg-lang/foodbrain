      <div class="mopt${inspoMode==='stock'?' active':''}" data-mode="stock">🥕 Aus dem Vorrat</div>
      <div class="mopt${inspoMode==='shop'?' active':''}" data-mode="shop">🛒 Mit Einkauf</div>
    </div>
    <button class="refine-toggle" id="refineToggle" type="button">⚙︎ Verfeinern <span class="chev">▾</span></button>
    <div class="refine-body" id="refineBody">${MOOD_GROUPS.map(moodGroup).join('')}</div>
    <div class="row">
      <button class="btn ghost" id="closeSheet">Schließen</button>
      <button class="btn solid" id="getIdeasBtn">Ideen holen</button>
    </div>`;
}

async function openInspiration(){
  stopRecording();
  await loadRecipeConfig();
  openSheet(inspoEntryHtml());
  wireClose();
  wireMood();
  sheet.querySelectorAll('.modetoggle .mopt').forEach(b=>b.addEventListener('click', ()=>{
    inspoMode = b.dataset.mode;
    sheet.querySelectorAll('.modetoggle .mopt').forEach(x=>x.classList.toggle('active', x===b));
  }));
  document.getElementById('refineToggle').addEventListener('click', ()=>{
    document.getElementById('refineBody').classList.toggle('show');
  });
  document.getElementById('getIdeasBtn').addEventListener('click', ()=>fetchIdeas(false));
}

async function fetchIdeas(force){
  const preferences = { cuisine: mood.cuisine, style: mood.style, needs: [...mood.needs] };
  const sig = ideaSig(preferences);
  // Show the last batch instantly unless the user explicitly refreshes.
  if (!force && ideaCache && ideaCache.sig === sig){ renderIdeas(ideaCache.data); return; }
  openSheet(`<h3>Ideen holen</h3>
    <div class="h3sub">${inspoMode==='shop'?'mit Einkauf':'aus dem Vorrat'}</div>
    <div class="loading">koche mir was aus…</div>`);
  let data;
  try {
    data = await apiPost('/api/recipes/ideas', {
      mode: inspoMode, preferences,
      idea_model: SETTINGS.idea_model || undefined,
      balance: SETTINGS.balance,
    });
  } catch (err){ return inspoError('Keine Ideen bekommen.', err, openInspiration); }
  ideaCache = { sig, data };
  renderIdeas(data);
}

function renderIdeas(data){
  const ideas = data.ideas || [];
  if (!ideas.length){
    return inspoError('Keine Ideen gefunden — vielleicht ist der Vorrat zu leer.',
      { message: 'Versuch es mit „Mit Einkauf“.' }, openInspiration);
  }
  const card = (idea, i) => `
    <button class="ideacard" data-idx="${i}" type="button">
      <div class="it">${esc(idea.title)}</div>
      ${idea.hook?`<div class="ih">${esc(idea.hook)}</div>`:''}
      <div class="imeta">
        ${idea.uses?`<span class="usebadge">rettet: ${esc(idea.uses)}</span>`:''}
        ${(idea.buy&&idea.buy.length)?`<span class="buybadge">🛒 ${esc(idea.buy.join(', '))}</span>`:''}
      </div>
    </button>`;
  openSheet(`
    <h3>Ideen</h3>
    <div class="h3sub">${data.mode==='shop'?'mit Einkauf':'aus dem Vorrat'} · tipp eine an</div>
    ${ideas.map(card).join('')}
    <div class="row">
      <button class="btn ghost" id="moreIdeas">‹ Zurück</button>
      <button class="btn solid" id="refreshIdeas">🔄 Neue Ideen</button>
    </div>
    <div class="row"><button class="btn ghost" id="closeSheet" style="flex:1">Schließen</button></div>`);
  wireClose();
  document.getElementById('moreIdeas').addEventListener('click', openInspiration);
  document.getElementById('refreshIdeas').addEventListener('click', ()=>fetchIdeas(true));
  sheet.querySelectorAll('.ideacard').forEach(c=>c.addEventListener('click', ()=>{
    openRecipe(ideas[Number(c.dataset.idx)], data.mode);
  }));
}

async function openRecipe(idea, mode){
  openSheet(`<h3>${esc(idea.title)}</h3>
    <div class="h3sub">wird zubereitet…</div>
    <div class="loading">schreibe das Rezept…</div>`);
  let rec;
  try {
    rec = await apiPost('/api/recipes/recipe', {
      idea, mode, recipe_model: SETTINGS.recipe_model || undefined,
    });
  } catch (err){ return inspoError('Rezept konnte nicht erstellt werden.', err, ()=>openRecipe(idea, mode)); }
  renderRecipe(rec, mode);
}

function renderRecipe(rec, mode){
  const phases = (rec.guidance || []).map(p=>`<div class="phase"><span class="pdot">→</span><span>${esc(p)}</span></div>`).join('')
    || `<div class="phase"><span>Keine Anleitung erhalten.</span></div>`;
  const buy = (mode==='shop' && rec.buy && rec.buy.length)
    ? `<div class="recbuy"><div class="rk">Einkaufsliste</div>${esc(rec.buy.join(' · '))}</div>` : '';
  openSheet(`
    <h3>${esc(rec.title)}</h3>
    <div class="h3sub">${rec.uses?('nutzt '+esc(rec.uses)):'Rezept'}</div>
    ${rec.time?`<div class="rectime">⏱ ${esc(rec.time)}</div>`:''}
    ${buy}
    ${phases}
    <div class="row" style="margin-top:16px">
      <button class="btn ghost" id="cookedBtn">Gekocht ✓</button>
      <button class="btn ghost" id="twistBtn">Meine Version</button>
      <button class="btn solid" id="saveRecBtn">Speichern</button>
    </div>
    <div class="row"><button class="btn ghost" id="closeSheet" style="flex:1">Schließen</button></div>`);
  wireClose();
  document.getElementById('cookedBtn').addEventListener('click', ()=> openCookReview(rec, mode));
  document.getElementById('saveRecBtn').addEventListener('click', async e=>{
    try {
      await apiPost('/api/recipes/save', { title: rec.title, guidance: rec.guidance || [], buy: rec.buy || [] });
      e.target.textContent = 'Gespeichert ✓';
    } catch(err){ showError(err); }
  });
  document.getElementById('twistBtn').addEventListener('click', ()=> openTwist(rec, mode));
}

/* "Meine Version" — capture a twist via text or voice (reuses the speech engine
   by borrowing the #intakeText / #micBtn ids the engine targets). */
function openTwist(rec, mode){
  stopRecording();
  const micHtml = SpeechRec
    ? `<button type="button" class="micbtn" id="micBtn" title="Zum Diktieren tippen">🎙</button>` : '';
  openSheet(`
    <h3>Meine Version</h3>
    <div class="h3sub">${esc(rec.title)} · was machst du anders? Das Rezept wird umgeschrieben.</div>
    <div class="micwrap">
      <textarea id="intakeText" placeholder="z. B. „mehr Knoblauch, statt Sahne Crème fraîche“"></textarea>
      ${micHtml}
    </div>
    <div class="row">
      <button class="btn ghost" id="twistBack">Zurück</button>
      <button class="btn solid" id="twistSave">Übernehmen</button>
    </div>`);
  const micBtn = document.getElementById('micBtn');
  if (micBtn) micBtn.addEventListener('click', toggleRecording);
  document.getElementById('twistBack').addEventListener('click', ()=>{ stopRecording(); renderRecipe(rec, mode); });
  document.getElementById('twistSave').addEventListener('click', async e=>{
    stopRecording();
    const text = (document.getElementById('intakeText')?.value || '').trim();
    if (!text) return;
    e.target.disabled = true; e.target.textContent = 'Schreibe um…';
    let data;
    try {
      // Fold the change into the recipe itself (regenerated guidance) and update
      // its book entry in place; the returned recipe carries `twist` so the
      // cook-estimate flow seeds its guess with the user's version.
      data = await apiPost('/api/recipes/revise', { recipe: rec, text, mode });
    } catch(err){ e.target.disabled = false; e.target.textContent = 'Übernehmen'; showError(err); return; }
    ideaCache = null; // recipe text changed — don't reshow a stale idea batch
    const revised = data.recipe || rec;
    if (!revised.twist) revised.twist = text;
    showSnack(`<b>${esc(revised.title)}</b> als deine Version aktualisiert`);
    renderRecipe(revised, mode);
  });
}

/* ---- Cook -> consumption tracking ----
   "Gekocht ✓" estimates what the dish used, lets the user adjust (typed, or a
   spoken correction re-estimates), books it to Grocy, then shows what landed. */
let cookCtx = null; // { rec, mode }

async function openCookReview(rec, mode){
  cookCtx = { rec, mode };
  openSheet(`<h3>${esc(rec.title)}</h3>
    <div class="h3sub">Gekocht — was wurde verbraucht?</div>
    <div class="loading">schätze den Verbrauch…</div>`);
  await fetchCookEstimate('');
}

async function fetchCookEstimate(correction){
  const { rec, mode } = cookCtx;
  // Seed every estimate with the recipe's saved "Meine Version" twist so the
  // consumption guess already reflects how the user really cooks it; any live
  // correction is appended on top.
  const combined = [(rec.twist || '').trim(), (correction || '').trim()].filter(Boolean).join('. ');
  let data;
  try {
    data = await apiPost('/api/recipes/cook-estimate', {
      dish: rec.title, guidance: rec.guidance || [], buy: rec.buy || [],
      mode, correction: combined,
    });
  } catch (err){ return inspoError('Verbrauch konnte nicht geschätzt werden.', err, ()=>openCookReview(rec, mode)); }
  renderCookReview(data);
}

function cookRow(it, i){
  const emoji = emojiFor(it.name);
  if (it.kind === 'bought'){
    return `<div class="crow" data-i="${i}" data-kind="bought" data-pid="${esc(it.matched_product_id||'')}"
         data-name="${esc(it.name)}" data-unit="${esc(it.unit||'')}">
      <div class="cname"><span class="emoji">${emoji}</span>${esc(it.name)}</div>
      <span class="cbadge bought">🛒 gekauft</span>
      <label>Packung <input class="cpack" type="number" min="0" step="0.1" value="${Number(it.pack_amount)||1}" /></label>
      <label>benutzt <input class="cused" type="number" min="0" step="0.1" value="${Number(it.used_amount)||0}" /></label>
      <span class="cunit">${esc(it.unit||'')}</span>
      <button class="cdrop" type="button" title="entfernen">✕</button>
    </div>`;
  }
  const matched = !!it.matched_product_id;
  const fuzzy = matched && it.match === 'fuzzy';
  const missing = it.match === 'missing'; // user named it, but it's not tracked
  const cls = !matched ? 'new' : (fuzzy ? 'fuzzy' : 'ok');
  const badge = matched
    ? `<span class="cbadge ${cls}">${fuzzy ? '~' : '✓'}</span>`
    : `<span class="cbadge new">${missing ? 'fehlt' : 'neu?'}</span>`;
  // Sub-line: which inventory entry this matched (so the user can confirm it's
  // the right "Römersalat" and not a wrongly-assumed fresh one), plus how much
  // is in stock and a live "bleibt" readout updated as the amount is edited.
  const hasStock = it.stock_amount != null;
  const su = esc(it.stock_unit || it.unit || '');
  const match = matched
    ? (fuzzy ? `vermutlich „${esc(it.matched_product_name || it.name)}" — passt das?`
             : `Vorrat: ${esc(it.matched_product_name || it.name)}`)
    : (missing
        ? `„${esc(it.name)}" ist nicht in deinem Vorrat — nicht verbucht. Leg es in Grocy an, um es zu tracken.`
        : `nicht im Vorrat — wird übersprungen`);
  const stockHave = hasStock ? `<span>im Vorrat: ${nfmt(it.stock_amount)}${su?(' '+su):''}</span>` : '';
  const leftSlot = hasStock ? `<span class="cleft" data-sunit="${su}"></span>` : '';
  // A "missing" row can't be consumed (nothing tracked) — offer to create it in
  // Grocy instead of the (disabled) amount input.
  const tail = missing
    ? `<button class="cmake" type="button">In Grocy anlegen</button>`
    : `<label>verbraucht <input class="camt" type="number" min="0" step="0.1" value="${Number(it.amount)||1}" ${matched?'':'disabled'} /></label>
       <span class="cunit">${esc(it.unit||'')}</span>`;
  return `<div class="crow${matched?'':' drop'}" data-i="${i}" data-kind="consume" data-pid="${esc(it.matched_product_id||'')}"
       data-name="${esc(it.name)}" data-unit="${esc(it.unit||'')}" data-amount="${Number(it.amount)||1}" data-stock="${hasStock?it.stock_amount:''}">
    <div class="cname"><span class="emoji">${emoji}</span>${esc(it.name)}</div>
    ${badge}
    <div class="cmeta ${cls}"><span class="cmatch">↳ ${match}</span>${stockHave}${leftSlot}</div>
    ${tail}
    <button class="cdrop" type="button" title="entfernen">✕</button>
  </div>`;
}

/* compact number: drop trailing zeros, German-friendly (1.5 -> "1,5") */
function nfmt(n){
  const v = Number(n);
  if (!isFinite(v)) return '';
  return (Math.round(v * 100) / 100).toLocaleString('de-DE', { maximumFractionDigits: 2 });
}

/* Recompute one consume row's "bleibt" readout from its stock + current input. */
function updateCookLeft(row){
  const slot = row.querySelector('.cleft');
  if (!slot) return;
  const stock = Number(row.dataset.stock);
  if (!isFinite(stock)) { slot.textContent = ''; return; }
  const amt = row.classList.contains('drop') ? 0 : (Number(row.querySelector('.camt')?.value) || 0);
  const left = stock - amt;
  const su = slot.dataset.sunit ? (' ' + slot.dataset.sunit) : '';
  slot.classList.toggle('empty', left <= 0.0001 && left >= -0.0001);
  slot.classList.toggle('over', left < -0.0001);
  slot.textContent = left < -0.0001
    ? `mehr als vorhanden! (nur ${nfmt(stock)}${su})`
    : (left <= 0.0001 ? 'bleibt: 0 — alles aufgebraucht ✓' : `bleibt: ${nfmt(left)}${su}`);
}

function renderCookReview(data){
  const { rec, mode } = cookCtx;
  const items = data.items || [];
  const consume = items.filter(x=>x.kind!=='bought');
  const bought = items.filter(x=>x.kind==='bought');
  const micHtml = SpeechRec
    ? `<button type="button" class="micbtn" id="micBtn" title="Korrektur diktieren">🎙</button>` : '';
  const rowsHtml = items.length
    ? `${consume.length?`<div class="cookgroup"><div class="ck">Verbraucht</div>${consume.map((it)=>cookRow(it, items.indexOf(it))).join('')}</div>`:''}
       ${bought.length?`<div class="cookgroup"><div class="ck">Gekauft (Pack rein, Rest bleibt)</div>${bought.map((it)=>cookRow(it, items.indexOf(it))).join('')}</div>`:''}`
    : `<div class="empty">Nichts zum Verbuchen erkannt. Beschreib unten, was du benutzt hast.</div>`;
  openSheet(`
    <h3>${esc(rec.title)}</h3>
    <div class="h3sub">prüfen & anpassen, dann verbuchen</div>
    ${rowsHtml}
    <div class="cookgroup">
      <div class="ck">Korrektur (optional)</div>
      <div class="micwrap">
        <textarea id="intakeText" placeholder="z. B. „nur die halbe Zwiebel, dafür mehr Reis“"></textarea>
        ${micHtml}
      </div>
      <button class="btn ghost" id="reEstimateBtn" type="button">Neu schätzen</button>
    </div>
    <div class="row">
      <button class="btn ghost" id="closeSheet">Schließen</button>
      <button class="btn solid" id="cookCommitBtn">Verbuchen</button>
    </div>`);
  wireClose();
  const micBtn = document.getElementById('micBtn');
  if (micBtn) micBtn.addEventListener('click', toggleRecording);
  sheet.querySelectorAll('.cdrop').forEach(b=> b.addEventListener('click', ()=>{
    const row = b.closest('.crow'); row.classList.toggle('drop');
    const amt = row.querySelector('.camt'); if (amt) amt.disabled = row.classList.contains('drop');
    updateCookLeft(row);
  }));
  sheet.querySelectorAll('.cmake').forEach(b=> b.addEventListener('click', ()=> openAddMissing(b.closest('.crow'))));
  // Live "bleibt" readout: seed each consume row, then recompute as edited.
  sheet.querySelectorAll('.crow[data-kind="consume"]').forEach(row=>{
    updateCookLeft(row);
    const amt = row.querySelector('.camt');
    if (amt) amt.addEventListener('input', ()=> updateCookLeft(row));
  });
  document.getElementById('reEstimateBtn').addEventListener('click', ()=>{
    stopRecording();
    const correction = (document.getElementById('intakeText')?.value || '').trim();
    if (!correction) return;
    openSheet(`<h3>${esc(rec.title)}</h3><div class="h3sub">neue Schätzung…</div>
      <div class="loading">rechne neu…</div>`);
    fetchCookEstimate(correction);
  });
  document.getElementById('cookCommitBtn').addEventListener('click', ()=> runCookCommit());
}

/* Compact modal over the cook review: create a "missing" (untracked) ingredient
   in Grocy as tracked stock, optionally deducting what this dish used right away.
   On success the originating row flips to "angelegt ✓" in place. */
function openAddMissing(row){
  const name = row.dataset.name || '';
  const unit = row.dataset.unit || '';
  const used = Number(row.dataset.amount) || 1;
  const emoji = emojiFor(name);
  const usedLabel = `und gleich ${nfmt(used)}${unit?(' '+esc(unit)):''} verbraucht buchen`;
  const el = document.createElement('div');
  el.className = 'modal';
  el.innerHTML = `<div class="modalcard">
    <h3>${emoji} ${esc(name)} anlegen</h3>
    <div class="h3sub">neues Produkt in Grocy — ab jetzt getrackt</div>
    <label>Anfangsmenge${unit?(' ('+esc(unit)+')'):''}</label>
    <input id="amInit" type="number" min="0.1" step="0.1" value="${nfmt(Math.max(used,1))}" />
    <label class="chk"><input id="amUse" type="checkbox" checked /> ${usedLabel}</label>
    <div class="merr" id="amErr"></div>
    <div class="row">
      <button class="btn ghost" id="amCancel" type="button">Abbrechen</button>
      <button class="btn solid" id="amOk" type="button">Anlegen</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  const close = ()=>{ el.classList.remove('show'); setTimeout(()=> el.remove(), 160); };
  el.addEventListener('click', e=>{ if (e.target === el) close(); });
  el.querySelector('#amCancel').addEventListener('click', close);
  el.querySelector('#amOk').addEventListener('click', async ()=>{
    const init = Number(el.querySelector('#amInit').value) || 0;
    const deduct = el.querySelector('#amUse').checked;
    const err = el.querySelector('#amErr');
    if (init <= 0){ err.textContent = 'Anfangsmenge muss größer als 0 sein.'; return; }
    const ok = el.querySelector('#amOk');
    ok.disabled = true; ok.textContent = 'Lege an…'; err.textContent = '';
    try {
      const res = await apiPost('/api/recipes/add-missing', {
        name, amount: init, unit: unit || null, used: deduct ? used : 0,
      });
      close();
      // Flip the row in place: now tracked + already booked here, so it keeps
      // the `drop` class to stay out of the cook-commit batch (no double count).
      row.classList.add('made');
      row.dataset.pid = res.product_id || '';
      const badge = row.querySelector('.cbadge'); if (badge) badge.textContent = '✓';
      const matchEl = row.querySelector('.cmatch');
      if (matchEl) matchEl.textContent = res.depleted
        ? `in Grocy angelegt — ganz aufgebraucht ✓`
        : `in Grocy angelegt: ${nfmt(res.amount)}${unit?(' '+esc(unit)):''}${res.used?` · ${nfmt(res.used)} verbraucht`:''}`;
      const mk = row.querySelector('.cmake'); if (mk) mk.remove();
    } catch (e2){
      ok.disabled = false; ok.textContent = 'Anlegen';
      err.textContent = (e2 && e2.message) ? e2.message : 'Anlegen fehlgeschlagen.';
    }
  });
}

function collectCookItems(){
  return [...sheet.querySelectorAll('.crow')]
    .filter(row => !row.classList.contains('drop'))
    .map(row => {
      const base = { name: row.dataset.name, unit: row.dataset.unit || null,
        matched_product_id: row.dataset.pid || null, kind: row.dataset.kind };
      if (row.dataset.kind === 'bought'){
        base.pack_amount = Number(row.querySelector('.cpack').value) || 1;
        base.used_amount = Number(row.querySelector('.cused').value) || 0;
      } else {
        base.amount = Number(row.querySelector('.camt').value) || 0;
      }
      return base;
    })
    .filter(it => it.name && (it.kind === 'bought' || it.amount > 0));
}

async function runCookCommit(){
  const { rec } = cookCtx;
  const items = collectCookItems();
  if (!items.length){ closeSheet(); return; }
  const btn = document.getElementById('cookCommitBtn');
  btn.disabled = true; btn.textContent = 'Verbuche…';
  stopRecording();
  let data;
  try { data = await apiPost('/api/recipes/cook-commit', { dish: rec.title, items }); }
  catch (err){ btn.disabled = false; btn.textContent = 'Verbuchen'; showError(err); return; }
  renderCookResult(data);
}

function renderCookResult(data){
  const lines = data.lines || [];
  const failed = data.failed || [];
  const added = lines.filter(l=>l.kind==='bought');
  const used = lines.filter(l=>l.kind!=='bought');
  const depleted = lines.filter(l=>l.depleted);
  const line = l => `<div class="cresult">${emojiFor(l.name)} ${esc(l.name)} · ${Number(l.amount)||0}${l.unit?(' '+esc(l.unit)):''}${l.depleted?' <span class="depleted">ganz aufgebraucht ✓</span>':''}</div>`;
  openSheet(`
    <h3>Verbucht ✓</h3>
    <div class="h3sub">${esc(data.dish)}</div>
    ${added.length?`<div class="cookgroup"><div class="ck">Hinzugefügt</div>${added.map(line).join('')}</div>`:''}
    ${used.length?`<div class="cookgroup"><div class="ck">Verbraucht</div>${used.map(line).join('')}</div>`:''}
    ${depleted.length?`<div class="cookgroup"><div class="ck">Ganz aufgebraucht</div>${depleted.map(l=>`<div class="cresult">${emojiFor(l.name)} ${esc(l.name)}</div>`).join('')}</div>`:''}
    ${failed.length?`<div class="sheet-error">Nicht verbucht: ${esc(failed.map(f=>f.name).join(', '))}</div>`:''}
    <div class="row">
      ${data.session_id && (added.length||used.length)?`<button class="btn ghost" id="cookUndoBtn" type="button">↩︎ Rückgängig machen</button>`:''}
      <button class="btn solid" id="closeSheet" style="flex:1">Fertig</button>
    </div>`);
  wireClose();
  const undoBtn = document.getElementById('cookUndoBtn');
  if (undoBtn) undoBtn.addEventListener('click', ()=> undoCookSession(data));
  reload();
}

/* Reverse the whole just-booked session (the "rückgängig machen" affordance). */
async function undoCookSession(data){
  const btn = document.getElementById('cookUndoBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'Mache rückgängig…'; }
  let res;
  try { res = await apiPost('/api/recipes/cook-undo', { session_id: data.session_id }); }
  catch(err){
    if (btn){ btn.disabled = false; btn.textContent = '↩︎ Rückgängig machen'; }
    return showError(err);
  }
  const failed = res.failed || [];
  openSheet(`
    <h3>${failed.length?'Teilweise rückgängig':'Rückgängig gemacht ✓'}</h3>
    <div class="h3sub">${esc(data.dish||'')}</div>
    <div class="cookgroup"><div class="cresult">${res.reversed||0} Buchung(en) zurückgenommen — Vorrat wie vorher.</div></div>
    ${failed.length?`<div class="sheet-error">Nicht zurückgenommen: ${esc(failed.map(f=>f.name).join(', '))}</div>`:''}
    <div class="row"><button class="btn solid" id="closeSheet" style="flex:1">Fertig</button></div>`);
  wireClose();
  reload();
}

/* Verlauf — past sessions, each consumed line correctable. */
async function openCookHistory(){
  openSheet(`<h3>Verlauf</h3><div class="h3sub">gekochte Gerichte</div><div class="loading">lade…</div>`);
  let data;
  try { data = await apiGet('/api/recipes/cook-history'); }
  catch(err){ return inspoError('Konnte den Verlauf nicht laden.', err, openCookHistory); }
  const sessions = data.sessions || [];
  const fmtDate = ts => { try { return new Date(ts).toLocaleDateString('de-DE'); } catch(_){ return ''; } };
  const lineHtml = (s, l, i) => {
    if (!l.product_id) return '';
    return `<div class="histline" data-sid="${esc(s.id)}" data-li="${i}">
      <span class="hn">${emojiFor(l.name)} ${esc(l.name)}</span>
      <input type="number" min="0" step="0.1" class="hamt" value="${Number(l.amount)||0}" />
      <span class="hu">${esc(l.unit||'')}</span>
      ${l.depleted?'<span class="hdep">leer ✓</span>':''}
      <button class="hsave" type="button">Korrigieren</button>
    </div>`;
  };
  const sess = s => `<div class="histsess">
    <div class="ht"><span>${esc(s.dish)}</span><span class="hd">${fmtDate(s.ts)}</span></div>
    ${(s.lines||[]).map((l,i)=>lineHtml(s,l,i)).join('')}
  </div>`;
  openSheet(`
    <h3>Verlauf</h3>
    <div class="h3sub">${sessions.length} gekocht · Mengen korrigierbar</div>
    ${sessions.length ? sessions.map(sess).join('') : '<div class="sheet-error">Noch nichts gekocht.</div>'}
    <div class="row"><button class="btn ghost" id="closeSheet" style="flex:1">Schließen</button></div>`);
  wireClose();
  sheet.querySelectorAll('.histline .hsave').forEach(btn=> btn.addEventListener('click', async ()=>{
    const row = btn.closest('.histline');
    const newAmount = Number(row.querySelector('.hamt').value);
    btn.disabled = true; btn.textContent = '…';
    try {
      const res = await apiPost('/api/recipes/cook-adjust', {
        session_id: row.dataset.sid, line_index: Number(row.dataset.li), new_amount: newAmount });
      btn.textContent = '✓';
      const dep = row.querySelector('.hdep');
      if (res.depleted && !dep){ const s=document.createElement('span'); s.className='hdep'; s.textContent='leer ✓'; row.insertBefore(s, btn); }
      else if (!res.depleted && dep){ dep.remove(); }
      reload();
    } catch(err){ btn.disabled = false; btn.textContent = 'Korrigieren'; showError(err); }
  }));
}

        const rest = partners.slice(PAIR_PEEK);

      block.hidden = false;
      btn.remove();

  });
  wireClose();
}

/* ---- Add by voice: talk at the fridge -> understand -> review -> store ---- */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, recording = false;
let committedText = '';   // banked speech, kept across auto-restart cycles
let liveSession = '';     // text of the current recognition session (not yet banked)
let prevResultLen = 0;    // to detect iOS truncating its results list mid-session
let restartTimer = null;

let intakeMode = 'add'; // 'add' (after shopping) or 'edit' (used / fix)

const INTAKE_COPY = {
  add: {
    title: 'In den Kühlschrank',
    sub: 'nach dem Einkauf · sprich oder tippe',
    placeholder: "Was hast du gekauft?",
    hint: SpeechRec
      ? `Tippe auf das Mikro und sag, was du gekauft hast — z. B. „einen halben Liter Milch, offen, hält etwa 4 Tage, und drei Karotten“.`
      : `Sprache ist in diesem Browser nicht verfügbar — tippe einfach, was du gekauft hast, und tippe auf Verstehen.`,
  },
  edit: {
    title: 'Verbrauchen / Ändern',
    sub: 'etwas benutzt oder Fehler korrigieren · sprich oder tippe',
    placeholder: "Was hast du benutzt, oder was stimmt nicht?",
    hint: SpeechRec
      ? `Tippe auf das Mikro und sag, was sich geändert hat — z. B. „ich habe die halbe Dose Tomaten benutzt, die Milch ist leer, und die Eier halten noch eine Woche“.`
      : `Sprache ist in diesem Browser nicht verfügbar — tippe einfach, was sich geändert hat, und tippe auf Verstehen.`,
  },
};

function captureSheetHtml(transcript){
  const copy = INTAKE_COPY[intakeMode];
  const speechHint = SpeechRec
    ? `<button type="button" class="micbtn" id="micBtn" title="Zum Diktieren tippen">🎙</button>`
    : '';
  return `
    <h3>${esc(copy.title)}</h3>
    <div class="h3sub">${esc(copy.sub)}</div>
    <div class="micwrap">
      <textarea id="intakeText" placeholder="${esc(copy.placeholder)}">${esc(transcript||'')}</textarea>
      ${speechHint}
    </div>
    <div class="micnote">${copy.hint}</div>
    <div class="row">
      <button class="btn ghost" id="closeSheet">Schließen</button>
      <button class="btn solid" id="understandBtn">Verstehen</button>
    </div>`;
}

document.getElementById('addBtn').addEventListener('click', ()=> openIntake(undefined, 'add'));
document.getElementById('editBtn').addEventListener('click', ()=> openIntake(undefined, 'edit'));

function openIntake(transcript, mode){
  if (mode) intakeMode = mode;
  stopRecording();
  openSheet(captureSheetHtml(transcript));
  wireClose();
  const micBtn = document.getElementById('micBtn');
  if (micBtn) micBtn.addEventListener('click', toggleRecording);
  document.getElementById('understandBtn').addEventListener('click', ()=> runUnderstand());
}

function toggleRecording(){
  if (recording){ stopRecording(); return; }
  if (!SpeechRec) return;
  const ta = document.getElementById('intakeText');
  committedText = ta && ta.value ? ta.value.trim() : '';
  liveSession = ''; prevResultLen = 0;
  recording = true;
  document.getElementById('micBtn')?.classList.add('rec');
  startRecognition();
}

// Show text in the box and grow it to fit, so nothing the user said is hidden
// behind a tiny scroll. Stays pinned to the newest words while recording.
function setIntakeText(ta, text){
  ta.value = text;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, Math.round(window.innerHeight * 0.5)) + 'px';
  ta.scrollTop = ta.scrollHeight;
}

// One recognition session. iOS/Safari ends a session on every pause and caps
// length, so onend transparently restarts it while the user still wants to
// record — that turns the flaky single-shot API into an unlimited, sturdy one.
function startRecognition(){
  if (!recording || !SpeechRec) return;
  recognition = new SpeechRec();
  recognition.lang = navigator.language || 'de-DE';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = (e)=>{
    const ta = document.getElementById('intakeText');
    if (!ta) return;
    // iOS Safari truncates its results list once it grows past an internal
    // limit ("the threshold") — resultIndex/length jump back down. When that
    // happens, bank what we have so the earlier words aren't lost.
    if (e.results.length < prevResultLen && liveSession){
      committedText = (committedText + ' ' + liveSession).trim();
      liveSession = '';
    }
    prevResultLen = e.results.length;
    // Rebuild the whole session from index 0 each event (handles interim->final
    // transitions without double-counting), then show banked + live.
    let session = '';
    for (let i = 0; i < e.results.length; i++) session += e.results[i][0].transcript + ' ';
    liveSession = session.trim();
    setIntakeText(ta, (committedText + ' ' + liveSession).trim());
  };
  recognition.onerror = (e)=>{
    // Permission denial is fatal; no-speech / network / aborted are recoverable
    // and get picked up by the auto-restart in onend.
    if (e && (e.error === 'not-allowed' || e.error === 'service-not-allowed')) stopRecording();
  };
  recognition.onend = ()=>{
    // Session ended (a pause, or iOS' length cap): bank everything it heard,
    // including words it never marked "final", then restart if still recording.
    if (liveSession){ committedText = (committedText + ' ' + liveSession).trim(); liveSession = ''; }
    prevResultLen = 0;
    if (!recording){ document.getElementById('micBtn')?.classList.remove('rec'); return; }
    clearTimeout(restartTimer);
    restartTimer = setTimeout(startRecognition, 200);
  };
  try { recognition.start(); } catch(_){}
}

function stopRecording(){
  recording = false;
  clearTimeout(restartTimer);
  const r = recognition;
  recognition = null;
  if (r){ r.onend = r.onerror = r.onresult = null; try { r.stop(); } catch(_){} try { r.abort(); } catch(_){} }
  document.getElementById('micBtn')?.classList.remove('rec');
}

async function runUnderstand(answers, transcriptArg){
  stopRecording();
  const title = INTAKE_COPY[intakeMode].title;
  // On the first pass the transcript lives in the #intakeText textarea; on a
  // re-check that textarea is gone (the review sheet replaced it), so the caller
  // passes the transcript explicitly. Reading the missing element used to throw
  // and silently abort — leaving "Erneut prüfen" doing nothing.
  const inputEl = document.getElementById('intakeText');
  const transcript = (transcriptArg != null ? String(transcriptArg)
                     : (inputEl ? inputEl.value : '')).trim();
  if (!transcript){ if (inputEl) inputEl.focus(); return; }
  openSheet(`<h3>${esc(title)}</h3>
    <div class="h3sub">lese deinen Kühlschrank…</div>
    <div class="loading">denke nach…</div>`);
  let data;
  try {
    data = await apiPost('/api/intake/understand', {
      transcript,
      answers: typeof answers === 'string' ? answers : '',
      mode: intakeMode,
    });
  } catch (err){
    sheet.innerHTML = `<div class="grip"></div><h3>${esc(title)}</h3>
      <div class="sheet-error"><b>Das habe ich nicht verstanden.</b><br>${esc(err.message)}</div>
      <div class="row">
        <button class="btn ghost" id="closeSheet">Schließen</button>
        <button class="btn solid" id="backBtn">Zurück</button>
      </div>`;
    wireClose();
    document.getElementById('backBtn').addEventListener('click', ()=> openIntake(transcript));
    return;
  }
  // Per-row location dropdowns need the real Grocy locations; best-effort so a
  // failed fetch (offline) just hides the picker instead of breaking intake.
  if (intakeMode !== 'edit'){ try { await _fetchLocations(); } catch(_){} }
  renderReview(transcript, data);
}

function badgeFor(it){
  if (it.match === 'exact') return `<span class="ibadge matched" title="passt zu ${esc(it.matched_product_name||'')} — tippen für neues Produkt">✓ in&nbsp;Grocy</span>`;
  if (it.match === 'fuzzy') return `<span class="ibadge fuzzy" title="ähnelt ${esc(it.matched_product_name||'')} — tippen für neues Produkt">≈ ${esc(it.matched_product_name||'Treffer')}</span>`;
  return `<span class="ibadge new">neu</span>`;
}

/* Map the model's English location guess ('freezer'/'fridge'/'pantry') to one of
   the household's real Grocy locations, reusing the card view's word patterns. */
function matchGrocyLocation(modelLoc, locs){
  const n = String(modelLoc||'').toLowerCase().trim();
  if (!n || !locs.length) return '';
  for (const l of locs){ const ln = l.name.toLowerCase(); if (ln===n || ln.includes(n) || n.includes(ln)) return l.name; }
  for (const [re] of LOC_SHORT){ if (re.test(n)){ const hit = locs.find(l=>re.test(l.name.toLowerCase())); if (hit) return hit.name; } }
  return '';
}

/* Per-row location dropdown built from the real Grocy locations. Empty when the
   list couldn't be fetched, so intake still works offline (lands in default). */
function locSelectHtml(selectedName){
  const locs = _cachedLocations || [];
  if (!locs.length) return '';
  const opts = ['<option value="">Ort —</option>'].concat(locs.map(l=>
    `<option value="${esc(l.name)}"${l.name===selectedName?' selected':''}>${locationMeta(l.name).icon} ${esc(l.name)}</option>`));
  return `<label>Ort <select class="iloc">${opts.join('')}</select></label>`;
}

function nameField(it){
  return `<div class="iname-wrap"><span class="emoji">${emojiFor(it.name)}</span>
    <input class="iname" value="${esc(it.name)}" /></div>`;
}

function reviewRow(it, i){
  const date = it.freshness_days != null ? isoFromOffset(it.freshness_days) : '';
  const qty = Number(it.quantity ?? 1);
  const selLoc = matchGrocyLocation(it.location, _cachedLocations || []);
  return `<div class="irow" data-i="${i}" data-pid="${esc(it.matched_product_id||'')}" data-mode="add">
    <input type="checkbox" class="ipick" checked />
    ${nameField(it)}
    ${badgeFor(it)}
    <div class="ifields">
      <label>Menge <input class="iqty" type="number" min="0" step="0.1" value="${qty}" /></label>
      <label>Einheit <input class="iunit" value="${esc(it.unit||'')}" placeholder="—" /></label>
      <label>haltbar bis <input class="idate" type="date" value="${date}" /></label>
      ${locSelectHtml(selLoc)}
      <label>geöffnet <input class="iopen" type="checkbox" ${it.opened?'checked':''} /></label>
      <button class="idrop" type="button" title="entfernen">✕</button>
    </div>
  </div>`;
}

/* Wire a single review row's controls. ``isEdit`` rows skip the detach-match
   handler (you can't act on stock you don't have). */
function wireReviewRow(row, isEdit){
  const drop = row.querySelector('.idrop');
  if (drop) drop.addEventListener('click', ()=>{
    row.classList.toggle('drop');
    const pick = row.querySelector('.ipick');
    if (pick && !pick.disabled) pick.checked = !row.classList.contains('drop');
  });
  if (!isEdit){
    const badge = row.querySelector('.ibadge.matched, .ibadge.fuzzy');
    if (badge) badge.addEventListener('click', ()=>{
      row.dataset.pid = '';                 // detach: commit as a brand-new product
      badge.outerHTML = '<span class="ibadge new">neu</span>';
    });
  }
}

const EDIT_ACTIONS = ['consume', 'toss', 'set_date'];
function stockItemFor(pid){
  return pid ? (items.find(x => x.id === String(pid)) || null) : null;
}

function editRow(it, i){
  const pid = it.matched_product_id || '';
  const matched = !!pid;
  const stock = stockItemFor(pid);
  const action = EDIT_ACTIONS.includes(it.action) ? it.action : 'consume';
  const amt = Number(it.quantity) || (stock ? stock.amount : 1);
  const date = it.freshness_days != null ? isoFromOffset(it.freshness_days)
             : (stock && stock.bestBefore ? stock.bestBefore : '');
  const badge = matched
    ? `<span class="ibadge matched">✓ in Grocy</span>`
    : `<span class="ibadge miss">nicht im Kühlschrank</span>`;
  const stockNote = stock ? `${esc(stock.qty)} im Kühlschrank` : 'nicht änderbar — nicht im Bestand';
  return `<div class="irow ${matched?'':'drop'}" data-i="${i}" data-pid="${esc(pid)}"
       data-mode="edit" data-action="${action}">
    <input type="checkbox" class="ipick" ${matched?'checked':''} ${matched?'':'disabled'} />
    ${nameField(it)}
    ${badge}
    <div class="ifields">
      <div class="iactions">
        <span class="iact ${action==='consume'?'on':''}" data-act="consume">benutzt</span>
        <span class="iact toss ${action==='toss'?'on':''}" data-act="toss">wegwerfen</span>
        <span class="iact ${action==='set_date'?'on':''}" data-act="set_date">Datum</span>
      </div>
      <label class="famt">Menge <input class="iqty" type="number" min="0" step="0.1" value="${amt}" /></label>
      <label class="fdate">haltbar bis <input class="idate" type="date" value="${date}" /></label>
      <span class="istock">${stockNote}</span>
      <button class="idrop" type="button" title="entfernen">✕</button>
    </div>
  </div>`;
}

function renderReview(transcript, data){
  const list = data.items || [];
  const questions = data.questions || [];
  const isEdit = intakeMode === 'edit';
  const title = INTAKE_COPY[intakeMode].title;
  const commitLabel = isEdit ? 'Änderungen übernehmen' : 'In den Kühlschrank';
  if (!list.length){
    sheet.innerHTML = `<div class="grip"></div><h3>${esc(title)}</h3>
      <div class="cgroup"><div class="empty">Nichts erkannt in „${esc(transcript)}“. Versuch es mit etwas mehr Details.</div></div>
      <div class="row"><button class="btn ghost" id="closeSheet">Schließen</button>
        <button class="btn solid" id="backBtn">Nochmal</button></div>`;
    wireClose();
    document.getElementById('backBtn').addEventListener('click', ()=> openIntake(transcript));
    return;
  }
  const qHtml = questions.length ? `
    <div class="iquestions">
      <div class="qk">Ein paar Rückfragen</div>
      <ul>${questions.map(q=>`<li>${esc(q)}</li>`).join('')}</ul>
      <div class="qanswer">
        <input id="answers" placeholder="hier antworten (optional)…" />
        <button class="qrecheck" id="recheckBtn" type="button">Erneut prüfen</button>
      </div>
    </div>` : '';

  const rowFn = isEdit ? editRow : reviewRow;
  const subText = isEdit
    ? `${list.length} Änderung${list.length>1?'en':''} · prüfen & anpassen, dann übernehmen`
    : `${list.length} Artikel · prüfen & anpassen, dann speichern`;

  openSheet(`
    <h3>${esc(title)}</h3>
    <div class="h3sub">${subText}</div>
    <div class="micnote heard" style="margin-bottom:8px">🎤 Gehört: „${esc(transcript)}"</div>
    ${data.summary ? `<div class="micnote" style="margin-bottom:10px">${esc(data.summary)}</div>` : ''}
    <div id="ireviewList">${list.map(rowFn).join('')}</div>
    ${isEdit ? '' : '<button class="iadd" id="addRowBtn" type="button">+ Artikel hinzufügen</button>'}
    ${qHtml}
    <div class="row">
      <button class="btn ghost" id="closeSheet">Schließen</button>
      <button class="btn solid" id="commitBtn">${commitLabel}</button>
    </div>`);
  wireClose();
  sheet.querySelectorAll('.irow').forEach(row=> wireReviewRow(row, isEdit));
  const addBtn = document.getElementById('addRowBtn');
  if (addBtn) addBtn.addEventListener('click', ()=>{
    const listEl = document.getElementById('ireviewList');
    const blank = { name:'', quantity:1, unit:'', freshness_days:null,
                    opened:false, location:'', matched_product_id:'', match:'new' };
    const tmp = document.createElement('div');
    tmp.innerHTML = reviewRow(blank, listEl.children.length);
    const row = tmp.firstElementChild;
    listEl.appendChild(row);
    wireReviewRow(row, false);
    row.querySelector('.iname').focus();
  });
  // Edit-mode: action chips (benutzt / wegwerfen / Datum) switch the row's action.
  sheet.querySelectorAll('.iactions').forEach(group=>{
    group.querySelectorAll('.iact').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        const row = chip.closest('.irow');
        row.dataset.action = chip.dataset.act;
        group.querySelectorAll('.iact').forEach(c=> c.classList.toggle('on', c===chip));
      });
    });
  });
  const recheck = document.getElementById('recheckBtn');
  if (recheck) recheck.addEventListener('click', ()=>{
    const ans = (document.getElementById('answers')?.value || '').trim();
    runUnderstand(ans, transcript);
  });
  document.getElementById('commitBtn').addEventListener('click', ()=> runCommit(transcript));
}

function collectItems(){
  return [...sheet.querySelectorAll('.irow')]
    .filter(row => row.querySelector('.ipick').checked && !row.classList.contains('drop'))
    .map(row => {
      const name = row.querySelector('.iname').value.trim();
      const pid = row.dataset.pid || null;
      if (row.dataset.mode === 'edit'){
        const action = row.dataset.action || 'consume';
        const item = { name, matched_product_id: pid, action };
        if (action === 'set_date'){
          item.best_before_date = row.querySelector('.idate').value || null;
        } else {
          item.quantity = Number(row.querySelector('.iqty').value) || 1;
        }
        return item;
      }
      return {
        name,
        matched_product_id: pid,
        quantity: Number(row.querySelector('.iqty').value) || 1,
        unit: row.querySelector('.iunit').value.trim() || null,
        best_before_date: row.querySelector('.idate').value || null,
        opened: row.querySelector('.iopen').checked,
        location: row.querySelector('.iloc')?.value || null,
      };
    })
    .filter(it => it.name);
}

async function runCommit(transcript){
  const isEdit = intakeMode === 'edit';
  const commitLabel = isEdit ? 'Änderungen übernehmen' : 'In den Kühlschrank';
  const items = collectItems();
  if (!items.length) return;
  const btn = document.getElementById('commitBtn');
  btn.disabled = true; btn.textContent = isEdit ? 'Übernehme…' : 'Füge hinzu…';
  let data;
  try { data = await apiPost('/api/intake/commit', { items }); }
  catch (err){
    btn.disabled = false; btn.textContent = commitLabel;
    showError(err);
    return;
  }
  const failed = data.failed || [];
  const done = isEdit ? (data.changed || 0) : (data.added || 0);

  // Everything failed: keep the sheet open so the items aren't lost, and show
  // why (the first couple of reasons) so it's fixable.
  if (done === 0 && failed.length){
    btn.disabled = false; btn.textContent = commitLabel;
    showError({ message: failItemsMsg(failed) });
    return;
  }

  closeSheet();
  if (failed.length){
    // Partial success: report what landed and which items didn't, so the user
    // knows not to re-add the whole list (which would duplicate the rest).
    const verb = isEdit ? 'aktualisiert' : 'hinzugefügt';
    showError({ message: `${done} ${verb}, ${failed.length} nicht: ${failItemsMsg(failed)}` });
  } else if (isEdit){
    showSnack(`<b>${done}</b> Artikel im Kühlschrank aktualisiert`);
  } else {
    const made = data.created_products ? ` (${data.created_products} neu)` : '';
    showSnack(`<b>${done}</b> Artikel${made} hinzugefügt`);
  }
  await reload();
}

/* Compact German summary of failed commit items (names, first few reasons). */
function failItemsMsg(failed){
  const names = failed.map(f => f.name).filter(Boolean);
  const shown = names.slice(0, 4).join(', ');
  const more = names.length > 4 ? ` +${names.length - 4} weitere` : '';
  const reason = failed[0] && failed[0].error ? ` (${failed[0].error})` : '';
  return `${shown}${more}${reason}`;
}

/* ---- load / reload from the API ---- */
async function reload(){
  let data;
  try { data = await apiGet('/api/stock'); }
  catch (err){
    shelvesEl.innerHTML = `<div class="nudge"><div class="k">◈ offline</div>
      <p>FoodBrain-API unter <b>${esc(API_BASE || location.origin)}</b> nicht erreichbar.
      Starte sie mit <b>python -m foodbrain_assistant.server --sample …</b>, oder öffne diese Seite
      mit <b>?api=http://host:8123</b>.</p></div>`;
    showError(err);
    return;
  }
  TODAY = data.as_of ? new Date(data.as_of) : new Date();
  items = (data.items || []).map(mapItem);
  lastSynced = Date.now();
  renderSyncLabel();
  render();
}

/* ---- sync: manual button, focus refresh, slow background fallback ---- */
let lastSynced = null;
let syncing = false;

function renderSyncLabel(){
  const label = document.getElementById('syncLabel');
  if (!label) return;
  if (syncing){ label.textContent = 'sync…'; return; }
  if (!lastSynced){ label.textContent = 'sync'; return; }
  const mins = Math.floor((Date.now() - lastSynced) / 60000);
  label.textContent =
    mins < 1 ? 'gerade' :
    mins < 60 ? `vor ${mins}m` :
    `vor ${Math.floor(mins / 60)}h`;
}

async function syncNow(){
  if (syncing) return;
  syncing = true;
  const btn = document.getElementById('syncBtn');
  btn?.classList.add('syncing');
  renderSyncLabel();
  try { await reload(); }
  finally {
    syncing = false;
    btn?.classList.remove('syncing');
    renderSyncLabel();
  }
}

document.getElementById('syncBtn').addEventListener('click', syncNow);

// Background sync if forgotten: re-fetch every 5 hours while the panel is open.
const BACKGROUND_SYNC_MS = 5 * 60 * 60 * 1000;
setInterval(() => { if (document.visibilityState === 'visible') syncNow(); }, BACKGROUND_SYNC_MS);

// Refresh when the panel becomes visible again (e.g. switching back on the phone).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') syncNow();
});

// Keep the "vor Xm" freshness label honest without re-fetching.
setInterval(renderSyncLabel, 60000);

/* ---- init ---- */
reload();

// Dim the Add/Edit buttons when voice intake isn't configured on the server.
apiGet('/api/health').then(h => {
  if (h && h.intake_enabled === false){
    ['addBtn','editBtn'].forEach(id=>{
      const b = document.getElementById(id);
      if (b){ b.disabled = true; b.title = 'Setze FOODBRAIN_OPENROUTER_API_KEY, um es zu aktivieren'; }
    });
  }
}).catch(()=>{});
</script>
